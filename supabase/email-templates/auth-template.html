<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cliniva Email</title>
  </head>
  <body style="margin:0; padding:0; background-color:#FAF3E1; color:#222222; font-family: Arial, Helvetica, sans-serif;">
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background-color:#FAF3E1; padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="max-width:600px; background-color:#F5E7C6; border-radius:18px; border:1px solid rgba(34,34,34,0.12); padding:32px;">
            <tr>
              <td style="font-size:22px; font-weight:700; line-height:1.35; padding-bottom:10px;">
                Confirm your email
              </td>
            </tr>
            <tr>
              <td style="font-size:15px; line-height:1.7; padding-bottom:20px; color:#222222;">
                Click the button below to confirm your email and activate your Cliniva account.
              </td>
            </tr>
            <tr>
              <td style="padding-bottom:18px;">
                <a
                  href="{{ .ConfirmationURL }}"
                  style="display:inline-block; background-color:#FA8112; color:#ffffff; text-decoration:none; padding:12px 22px; border-radius:10px; font-size:14px; font-weight:600;"
                >
                  Confirm email
                </a>
              </td>
            </tr>
            <tr>
              <td style="font-size:13px; color:#222222; opacity:0.7;">
                If you did not request this, you can safely ignore this email.
              </td>
            </tr>
          </table>
          <div style="max-width:600px; font-size:12px; color:#222222; opacity:0.6; padding-top:18px; text-align:center;">
            Cliniva, Inc. - Virtual Health Infrastructure
          </div>
        </td>
      </tr>
    </table>
  </body>
</html>
